name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Backend tests
        run: npm run test:backend

      - name: Frontend tests
        run: npm run test:frontend

      - name: Frontend tests with coverage
        run: npm run test:frontend:coverage

      - name: Backend tests with coverage
        run: npm run test:backend:coverage

      - name: Build frontend
        run: npm run build:frontend

      - name: Validate backend (syntax)
        run: node --check Backend/src/server.js

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-code
          path: Backend

  cd:
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'workflow_dispatch'

    env:
      RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
      RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}

    steps:
      - name: Deploy backend (Render)
        run: |
          if [ -n "$RENDER_BACKEND_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_BACKEND_DEPLOY_HOOK"
          else
            echo "RENDER_BACKEND_DEPLOY_HOOK not set; skipping backend deploy."
          fi

      - name: Deploy frontend (Render)
        run: |
          if [ -n "$RENDER_FRONTEND_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_FRONTEND_DEPLOY_HOOK"
          else
            echo "RENDER_FRONTEND_DEPLOY_HOOK not set; skipping frontend deploy."
          fi